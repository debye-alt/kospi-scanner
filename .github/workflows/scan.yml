name: KOSPI 저점-반등 스캔

on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 스캐너 실행
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          python scanner.py \
            --top 100 \
            --lookback 60 \
            --rebound-pct-min 3 \
            --rebound-pct-max 20 \
            --min-days-since-low 1 \
            --max-days-since-low 15 \
            --min-score 20 \
            --json-out data/results.json

      - name: 결과 커밋 및 푸시
        run: |
          git config user.name "kospi-scanner-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/results.json
          git diff --staged --quiet || git commit -m "자동 갱신: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
