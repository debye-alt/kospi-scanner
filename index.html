<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0e14" />
<title>코스피 저점-반등 스캐너</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0e14;
    --surface: #11161f;
    --surface-2: #161d28;
    --border: rgba(255,255,255,0.08);
    --text: #e8ecf1;
    --text-dim: #7c8794;
    --up: #ff4d4d;
    --up-dim: #45222a;
    --down: #4d8dff;
    --gold: #ffc93d;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, 'Malgun Gothic', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  header.header {
    position: relative;
    overflow: hidden;
    padding: 28px 20px 22px;
    background:
      radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px) 0 0/14px 14px,
      var(--bg);
    border-bottom: 1px solid var(--border);
  }

  .sweep {
    position: absolute;
    top: -60%;
    right: -40%;
    width: 240px;
    height: 240px;
    background: conic-gradient(from 0deg, rgba(255,77,77,0.16), transparent 28%);
    border-radius: 50%;
    animation: spin 7s linear infinite;
    pointer-events: none;
  }
  @media (prefers-reduced-motion: reduce) { .sweep { animation: none; } }
  @keyframes spin { to { transform: rotate(360deg); } }

  .eyebrow {
    margin: 0 0 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--up);
    font-weight: 600;
  }
  h1 {
    margin: 0 0 10px;
    font-size: 22px;
    letter-spacing: -0.01em;
  }
  .meta {
    margin: 0;
    font-size: 12.5px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }
  .refresh-btn {
    margin-top: 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 7px;
  }
  .refresh-btn:active { background: var(--border); }

  main { padding: 16px; max-width: 640px; margin: 0 auto; }

  .status {
    text-align: center;
    color: var(--text-dim);
    padding: 60px 20px;
    font-size: 13.5px;
    line-height: 1.7;
  }
  .status .glyph {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    color: var(--border);
    display: block;
    margin-bottom: 10px;
  }

  ol.list { list-style: none; margin: 0; padding: 0; }

  .card {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 9px;
  }
  .card.top {
    border-color: rgba(255,201,61,0.4);
    box-shadow: 0 0 0 1px rgba(255,201,61,0.12) inset;
  }
  .rank {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    width: 18px;
    text-align: center;
    flex-shrink: 0;
  }
  .card.top .rank { color: var(--gold); }

  .id-block { min-width: 0; flex: 1; }
  .name-row { display: flex; align-items: baseline; gap: 6px; }
  .name { font-size: 14.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .code { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-dim); }
  .low-date { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-dim); margin-top: 3px; }

  .chips { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
  .chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.04em;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .chip.on { color: var(--up); border-color: rgba(255,77,77,0.35); background: rgba(255,77,77,0.07); }

  .price-block { text-align: right; flex-shrink: 0; }
  .last-price { font-size: 14.5px; font-weight: 600; }
  .pct-up { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--up); }

  .score-block { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 34px; flex-shrink: 0; }
  .score-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }
  .card.top .score-num { color: var(--gold); }
  .score-bar-bg { width: 6px; height: 46px; background: var(--surface-2); border-radius: 3px; overflow: hidden; display: flex; align-items: flex-end; }
  .score-bar-fill { width: 100%; background: var(--up); border-radius: 3px; }
  .card.top .score-bar-fill { background: var(--gold); }

  footer.footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 11px;
    padding: 24px 20px 40px;
    line-height: 1.7;
  }

  .card { cursor: pointer; }
  .card:active { background: var(--surface-2); }

  .filter-bar {
    display: flex;
    gap: 7px;
    overflow-x: auto;
    padding: 14px 16px 2px;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    letter-spacing: 0.02em;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
  }
  .filter-chip.active {
    border-color: var(--up);
    background: rgba(255,77,77,0.12);
    color: var(--up);
  }
  .filter-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    padding: 8px 16px 0;
    margin: 0;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }

  .sheet {
    width: 100%;
    max-width: 640px;
    max-height: 86vh;
    overflow-y: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 16px 16px 0 0;
    padding: 18px 18px 30px;
    transform: translateY(100%);
    transition: transform .25s ease;
  }
  .overlay.show .sheet { transform: translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px; border-radius: 3px;
    background: var(--border); margin: 0 auto 14px;
  }
  .sheet-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .sheet-name { font-size: 17px; font-weight: 700; }
  .sheet-code { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .sheet-close {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text-dim);
    width: 28px; height: 28px; border-radius: 50%; font-size: 14px; flex-shrink: 0;
  }

  .sheet-price-row { display: flex; align-items: baseline; gap: 10px; margin: 12px 0 4px; }
  .sheet-price { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; }
  .sheet-pct { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--up); }

  .chart-wrap { margin: 16px 0 6px; }
  .chart-wrap svg { width: 100%; height: auto; display: block; }
  .chart-empty { color: var(--text-dim); font-size: 12.5px; text-align: center; padding: 30px 0; }
  .chart-label { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; fill: var(--text-dim); }

  .sheet-chips { display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap; }
</style>
</head>
<body>

<header class="header">
  <div class="sweep" aria-hidden="true"></div>
  <div class="header-content">
    <p class="eyebrow">KOSPI SIGNAL SCANNER</p>
    <h1>저점-반등 스캐너</h1>
    <p class="meta" id="meta-line">불러오는 중...</p>
    <button class="refresh-btn mono" id="refresh-btn">⟳ 새로고침</button>
  </div>
</header>

<main>
  <div class="filter-bar" id="filter-bar">
    <button class="filter-chip" data-preset="aggressive">적극적 (2~5일·3~8%)</button>
    <button class="filter-chip" data-preset="standard">표준 (3~10일·5~15%)</button>
    <button class="filter-chip" data-preset="loose">느슨 (1~15일·3~20%)</button>
    <button class="filter-chip" data-preset="all">전체보기</button>
  </div>
  <p class="filter-count mono" id="filter-count"></p>
  <div id="status" class="status" hidden></div>
  <ol id="list" class="list"></ol>
</main>

<footer class="footer">
  종가 기준 자동 분석 결과이며 매수·매도 추천이 아닙니다.<br />
  실제 투자 결정은 추가 분석 후 본인 판단으로 하시기 바랍니다.
</footer>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-top">
      <div>
        <div class="sheet-name" id="sheet-name"></div>
        <div class="sheet-code mono" id="sheet-code"></div>
      </div>
      <button class="sheet-close" id="sheet-close">✕</button>
    </div>
    <div class="sheet-price-row">
      <span class="sheet-price mono" id="sheet-price"></span>
      <span class="sheet-pct mono" id="sheet-pct"></span>
    </div>
    <div class="chart-wrap" id="chart-wrap"></div>
    <div class="sheet-chips" id="sheet-chips"></div>
  </div>
</div>

<script>
  const listEl = document.getElementById('list');
  const statusEl = document.getElementById('status');
  const metaEl = document.getElementById('meta-line');

  function fmtNum(n) {
    return n == null ? '-' : n.toLocaleString('ko-KR');
  }

  function fmtGeneratedAt(iso) {
    if (!iso) return null;
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function showStatus(glyph, text) {
    listEl.innerHTML = '';
    statusEl.hidden = false;
    statusEl.innerHTML = `<span class="glyph">${glyph}</span>${text}`;
  }

  function renderCard(item, index) {
    const isTop = index === 0;
    const chips = [
      { on: item.golden_cross, label: 'GC 골든크로스' },
      { on: item.rsi_recovering, label: 'RSI 회복' },
      { on: item.volume_up, label: 'VOL 거래량↑' },
    ].map(c => `<span class="chip ${c.on ? 'on' : ''}">${c.label}</span>`).join('');

    const barHeight = Math.max(4, Math.round((item.score / 100) * 46));

    return `
      <li class="card ${isTop ? 'top' : ''}" data-code="${item.code}">
        <span class="rank mono">${index + 1}</span>
        <div class="id-block">
          <div class="name-row">
            <span class="name">${item.name}</span>
            <span class="code mono">${item.code}</span>
          </div>
          <div class="low-date mono">저점 ${item.low_date}</div>
          <div class="chips">${chips}</div>
        </div>
        <div class="price-block">
          <div class="last-price mono">${fmtNum(item.last_price)}</div>
          <div class="pct-up mono">▲ ${item.pct_from_low}%</div>
        </div>
        <div class="score-block">
          <span class="score-num">${item.score}</span>
          <div class="score-bar-bg"><div class="score-bar-fill" style="height:${barHeight}px"></div></div>
        </div>
      </li>
    `;
  }

  const PRESETS = {
    aggressive: { label: '적극적', minDays: 2, maxDays: 5, minPct: 3, maxPct: 8 },
    standard:   { label: '표준',   minDays: 3, maxDays: 10, minPct: 5, maxPct: 15 },
    loose:      { label: '느슨',   minDays: 1, maxDays: 15, minPct: 3, maxPct: 20 },
    all:        { label: '전체',   minDays: 0, maxDays: 9999, minPct: 0, maxPct: 9999 },
  };
  let activePreset = 'aggressive';
  let allCandidates = [];
  const filterCountEl = document.getElementById('filter-count');

  function applyFilter(key) {
    activePreset = key;
    document.querySelectorAll('.filter-chip').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.preset === key);
    });

    const p = PRESETS[key];
    currentCandidates = allCandidates
      .filter(c => c.days_since_low >= p.minDays && c.days_since_low <= p.maxDays
                 && c.pct_from_low >= p.minPct && c.pct_from_low <= p.maxPct)
      .sort((a, b) => b.score - a.score);

    filterCountEl.textContent = `'${p.label}' 기준 · ${currentCandidates.length}종목`;

    if (currentCandidates.length === 0) {
      showStatus('○', `'${p.label}' 기준에 맞는 종목이 없습니다.<br/>다른 기준을 선택해보세요.`);
      return;
    }
    statusEl.hidden = true;
    listEl.innerHTML = currentCandidates.map(renderCard).join('');
  }

  document.getElementById('filter-bar').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-chip');
    if (btn) applyFilter(btn.dataset.preset);
  });

  function render(data) {
    const generated = fmtGeneratedAt(data.generated_at);

    if (!data.generated_at) {
      metaEl.textContent = '대기 중';
      document.getElementById('filter-bar').hidden = true;
      filterCountEl.textContent = '';
      showStatus('···', '아직 첫 스캔이 실행되지 않았습니다.<br/>GitHub Actions에서 워크플로우를 한 번 실행해주세요.');
      allCandidates = [];
      currentCandidates = [];
      return;
    }

    document.getElementById('filter-bar').hidden = false;
    metaEl.textContent = `기준 ${generated} · 상위 ${data.params?.top ?? '-'}종목 분석`;

    allCandidates = (data.candidates || []).slice();
    applyFilter(activePreset);
  }

  // ---- 상세 차트 시트 ----
  const overlayEl = document.getElementById('overlay');
  const sheetNameEl = document.getElementById('sheet-name');
  const sheetCodeEl = document.getElementById('sheet-code');
  const sheetPriceEl = document.getElementById('sheet-price');
  const sheetPctEl = document.getElementById('sheet-pct');
  const chartWrapEl = document.getElementById('chart-wrap');
  const sheetChipsEl = document.getElementById('sheet-chips');

  function buildChartSVG(item) {
    const history = item.history || [];
    if (history.length < 2) {
      return '<div class="chart-empty">차트 데이터가 없습니다.<br/>다음 스캔 이후부터 표시됩니다.</div>';
    }

    const W = 320, H = 168, PAD = 6;
    const PRICE_TOP = 6, PRICE_H = 84;
    const PRICE_BOTTOM = PRICE_TOP + PRICE_H;
    const VOL_TOP = PRICE_BOTTOM + 12, VOL_H = 38;
    const VOL_BOTTOM = VOL_TOP + VOL_H;
    const LABEL_Y = VOL_BOTTOM + 14;

    const n = history.length;
    const stepX = (W - PAD * 2) / (n - 1);
    const xAt = i => PAD + stepX * i;

    const prices = history.map(h => h.close);
    const min = Math.min(...prices);
    const max = Math.max(...prices);
    const range = (max - min) || 1;
    const yAt = v => PRICE_TOP + PRICE_H - ((v - min) / range) * PRICE_H;

    const volumes = history.map(h => h.volume || 0);
    const maxVol = Math.max(...volumes, 1);
    const barW = Math.max(1.2, stepX * 0.6);

    const points = history.map((h, i) => `${xAt(i).toFixed(1)},${yAt(h.close).toFixed(1)}`).join(' ');
    const areaPath = `M${xAt(0).toFixed(1)},${PRICE_BOTTOM.toFixed(1)} L${points.split(' ').join(' L')} L${xAt(n - 1).toFixed(1)},${PRICE_BOTTOM.toFixed(1)} Z`;

    let lowIdx = 0;
    for (let i = 1; i < history.length; i++) if (history[i].close < history[lowIdx].close) lowIdx = i;
    const lastIdx = n - 1;

    const volBars = history.map((h, i) => {
      const bh = (volumes[i] / maxVol) * VOL_H;
      const x = (xAt(i) - barW / 2).toFixed(1);
      const y = (VOL_BOTTOM - bh).toFixed(1);
      const isLast = i === lastIdx;
      return `<rect x="${x}" y="${y}" width="${barW.toFixed(1)}" height="${bh.toFixed(1)}" fill="${isLast ? 'rgba(255,201,61,0.6)' : 'rgba(124,135,148,0.45)'}"></rect>`;
    }).join('');

    const fmtMD = (iso) => {
      const d = new Date(iso);
      return isNaN(d.getTime()) ? iso : `${d.getMonth() + 1}/${d.getDate()}`;
    };

    return `
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <text class="chart-label" x="${PAD}" y="${(VOL_TOP - 3).toFixed(1)}" text-anchor="start">거래량</text>
        <line x1="${PAD}" y1="${PRICE_BOTTOM.toFixed(1)}" x2="${W - PAD}" y2="${PRICE_BOTTOM.toFixed(1)}" stroke="rgba(255,255,255,0.07)" stroke-width="1"></line>
        <path d="${areaPath}" fill="rgba(255,77,77,0.10)" stroke="none"></path>
        ${volBars}
        <polyline points="${points}" fill="none" stroke="#ff4d4d" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"></polyline>
        <circle cx="${xAt(lowIdx).toFixed(1)}" cy="${yAt(history[lowIdx].close).toFixed(1)}" r="3" fill="#4d8dff"></circle>
        <circle cx="${xAt(lastIdx).toFixed(1)}" cy="${yAt(history[lastIdx].close).toFixed(1)}" r="3.2" fill="#ffc93d"></circle>
        <text class="chart-label" x="${xAt(lowIdx).toFixed(1)}" y="${LABEL_Y.toFixed(1)}" text-anchor="middle">저점 ${fmtMD(history[lowIdx].date)}</text>
        <text class="chart-label" x="${xAt(0).toFixed(1)}" y="${LABEL_Y.toFixed(1)}" text-anchor="start">${fmtMD(history[0].date)}</text>
        <text class="chart-label" x="${xAt(lastIdx).toFixed(1)}" y="${LABEL_Y.toFixed(1)}" text-anchor="end">${fmtMD(history[lastIdx].date)}</text>
      </svg>
    `;
  }

  function openDetail(code) {
    const item = currentCandidates.find(c => c.code === code);
    if (!item) return;

    sheetNameEl.textContent = item.name;
    sheetCodeEl.textContent = item.code;
    sheetPriceEl.textContent = fmtNum(item.last_price);
    sheetPctEl.textContent = `▲ ${item.pct_from_low}% (저점 ${fmtNum(item.low_price)})`;
    chartWrapEl.innerHTML = buildChartSVG(item);

    const chips = [
      { on: item.golden_cross, label: 'GC 골든크로스' },
      { on: item.rsi_recovering, label: 'RSI 회복' },
      { on: item.volume_up, label: 'VOL 거래량↑' },
    ].map(c => `<span class="chip ${c.on ? 'on' : ''}">${c.label}</span>`).join('');
    sheetChipsEl.innerHTML = chips;

    overlayEl.classList.add('show');
  }

  function closeDetail() {
    overlayEl.classList.remove('show');
  }

  listEl.addEventListener('click', (e) => {
    const card = e.target.closest('.card');
    if (card) openDetail(card.dataset.code);
  });
  document.getElementById('sheet-close').addEventListener('click', closeDetail);
  overlayEl.addEventListener('click', (e) => { if (e.target === overlayEl) closeDetail(); });

  let currentCandidates = [];


  async function load(force) {
    try {
      const url = './data/results.json' + (force ? ('?t=' + Date.now()) : '');
      const res = await fetch(url, { cache: force ? 'no-store' : 'default' });
      if (!res.ok) throw new Error('fetch failed: ' + res.status);
      render(await res.json());
    } catch (e) {
      metaEl.textContent = '오류';
      showStatus('!', '데이터를 불러오지 못했습니다.<br/>네트워크 연결을 확인 후 새로고침 해주세요.');
    }
  }

  document.getElementById('refresh-btn').addEventListener('click', () => load(true));
  load(false);

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>

</body>
</html>
